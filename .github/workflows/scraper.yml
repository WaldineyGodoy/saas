name: Neoenergia Invoice Scraper

on:
  schedule:
    - cron: '0 8 * * *' # Diariamente às 05:00 BRT (08:00 UTC)
  workflow_dispatch: 
    inputs:
      target_days:
        description: 'Dias de leitura (ex: 5 ou 1,2,3...)'
        required: false
        default: ''
      reason:
        description: 'Motivo do disparo manual'
        required: false
        default: 'Manual trigger from CRM'
  repository_dispatch:
    types: [trigger-scraper]

jobs:
  scrape:
    name: Executar Agente Neoenergia
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scraper
          npm install

      - name: Install Playwright Browsers
        run: |
          cd scraper
          npx playwright install firefox --with-deps

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TARGET_DAYS: ${{ github.event.inputs.target_days || github.event.client_payload.value || '' }}
        run: |
          cd scraper
          node scraper.js
