name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: crm.b2wenergia.com.br

  deploy-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 'latest'

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy merge-pdf --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy send-email --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy send-whatsapp --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy create-asaas-charge --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy update-asaas-charge --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy cancel-asaas-charge --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy manage-asaas-customer --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy parse-invoice --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy transfer-asaas-pix --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy trigger-faturista --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
